[build]
  publish = ".next"
  command = "npm run build"

[build.environment]
  NODE_OPTIONS = "--experimental-global-webcrypto"

[[redirects]]
  from = "/revalidation/*"
  to = "/image-cdn"
  status = 302

[[redirects]]
  from = "/classics"
  to = "/image-cdn"
  status = 302

[[redirects]]
  from = "/revalidation2/*"
  to = "/resources/blog/?redirected=:splat"
  status = 302

[[redirects]]
  from = "/resources/*"
  to = "/resources/?redirected=:splat"
  status = 302

